services:
  - type: web
    name: clinic-lens-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALI_ACCESS_KEY
        sync: false
      - key: ALI_SECRET_KEY
        sync: false
      - key: ALI_ROLE_ARN
        sync: false
      - key: OSS_REGION
        sync: false
      - key: OSS_BUCKET_NAME
        sync: false
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_EXTRACT_MODEL
        value: qwen-vl-plus
      - key: DASHSCOPE_SUMMARY_MODEL
        value: qwen-max
      - key: DASHSCOPE_CHAT_MODEL
        value: qwen-plus
      - key: DASHSCOPE_INDICATOR_MODEL
        value: qwen-turbo
